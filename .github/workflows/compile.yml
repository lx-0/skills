name: Compile

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'plugins/**'
      - 'marketplace.json'
      - 'compile.mjs'
      - 'clean.mjs'
      - '.github/workflows/compile.yml'

permissions:
  contents: write

concurrency:
  group: compile-${{ github.ref }}
  cancel-in-progress: false

jobs:
  compile:
    name: Regenerate .compiled/ + marketplace symlinks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip when the push that triggered this run is itself the recompile
    # commit (committed as `github-actions[bot]` -- see push step below).
    # Without the guard the workflow would re-trigger itself.
    if: github.event.head_commit.author.name != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run compile
        run: |
          node clean.mjs
          node compile.mjs

      - name: Detect changes (incl. new bundle symlinks)
        id: diff
        run: |
          # `git status --porcelain` covers both modified-tracked AND
          # new-untracked files. compile.mjs scaffolds bundle symlinks under
          # plugins/<name>/.claude-plugin/ and .cursor-plugin/; for a brand-new
          # bundle those would be untracked and `git diff --quiet` alone would
          # silently miss them.
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes after compile."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git status --short
          fi

      - name: Commit + push regenerated artifacts
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .compiled .claude-plugin .cursor-plugin plugins
          git commit -m "compile: regenerate artifacts"
          git push origin HEAD:main
